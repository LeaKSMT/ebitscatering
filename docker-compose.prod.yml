version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    environment:
      - NODE_ENV=production
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - ebits-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - DB_HOST=mysql
      - DB_USER=ebits_user
      - DB_PASSWORD=secure_password_123
      - DB_NAME=ebits_catering_db
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=https://your-domain.com
    volumes:
      - ./logs:/app/logs
      - ./backups:/app/backups
    depends_on:
      - mysql
    restart: unless-stopped
    networks:
      - ebits-network

  mysql:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    environment:
      - MYSQL_ROOT_PASSWORD=root_password_123
      - MYSQL_DATABASE=ebits_catering_db
      - MYSQL_USER=ebits_user
      - MYSQL_PASSWORD=secure_password_123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/ebits_catering_db.sql:/docker-entrypoint-initdb.d/init.sql
      - ./mysql/conf:/etc/mysql/conf.d
    restart: unless-stopped
    networks:
      - ebits-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - ebits-network

  nginx:
    image: nginx:alpine
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - ebits-network

volumes:
  mysql_data:
  redis_data:

networks:
  ebits-network:
    driver: bridge
